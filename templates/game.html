{% extends "base.html" %}
{% block content %}

<div id="zona-juego">

    <!-- ============================
         CONTENEDOR PRINCIPAL IZQUIERDO
    ============================= -->
    <div id="contenedor">

        <!-- ============================
             EQUIPOS DENTRO DEL CONTENEDOR
        ============================= -->
        <div id="equipos-wrapper">

            <div id="selector-equipos">
                <button class="btn-equipo activo" data-equipo="1">
                    <span class="nombre-equipo">Equipo 1</span>
                    <span class="rename-equipo" data-equipo="1">✏️</span>
                </button>

                <button class="btn-equipo" data-equipo="2">
                    <span class="nombre-equipo">Equipo 2</span>
                    <span class="rename-equipo" data-equipo="2">✏️</span>
                </button>

                <button class="btn-equipo" data-equipo="3">
                    <span class="nombre-equipo">Equipo 3</span>
                    <span class="rename-equipo" data-equipo="3">✏️</span>
                </button>

                <button class="btn-equipo" data-equipo="4">
                    <span class="nombre-equipo">Equipo 4</span>
                    <span class="rename-equipo" data-equipo="4">✏️</span>
                </button>

                <button class="btn-equipo-add">+ Añadir equipo</button>
            </div>

            <div id="panel-equipo-activo">
                <h3 id="equipo-activo-nombre"></h3>
                <p>Fallos: <span id="equipo-activo-fallos">0</span>/3</p>
                <p>Citas ganadas: <span id="equipo-activo-ganadas">0</span></p>
            </div>

        </div>

        <!-- ============================
             ZONA DE JUEGO ORIGINAL
        ============================= -->
        <div id="col-letra">

            <div id="botones-superiores">
                <button id="btn-completar-cita" class="btn-meta">Completar cita</button>
                <button id="btn-revelar" class="btn-meta">Revelar cita</button>
            </div>

            <h2 id="titulo-cita">
                <span>Cita</span>

                <span id="fallos-wrapper">
                    <span id="panel-fallos">Fallos: 0/3</span>

                    <button id="btn-reset-fallos" class="btn-reset-fallos" title="Reiniciar fallos">
                        <svg viewBox="0 0 24 24" class="icono-reset">
                            <path
                                d="M12 5V1L7 6l5 5V7c3.3 0 6 2.7 6 6s-2.7 6-6 6-6-2.7-6-6H4c0 4.4 3.6 8 8 8s8-3.6 8-8-3.6-8-8-8z" />
                        </svg>
                    </button>
                </span>
            </h2>

            <div id="panel-cita" class="panel placeholder">
                Pulsa “Iniciar juego” para comenzar
            </div>

            <div id="chips-meta">
                <div class="chip"><span class="chip-label">Idioma:</span><span id="panel-idioma"
                        class="chip-value"></span></div>
                <div class="chip"><span class="chip-label">Autor:</span><span id="panel-autor"
                        class="chip-value"></span></div>
                <div class="chip"><span class="chip-label">Año:</span><span id="panel-anio" class="chip-value"></span>
                </div>
            </div>

            <div class="botones">
                <button id="btn-iniciar">Iniciar juego</button>
                <button id="btn-siguiente">Siguiente cita</button>
            </div>

        </div>
    </div>

    <!-- ============================
         TECLADO DERECHA
    ============================= -->
    <div id="bloque-teclado">
        <h2>Teclado</h2>
        <div id="teclado" class="placeholder">El teclado aparecerá aquí</div>
    </div>

</div>

<!-- ============================
     MODAL DE VÍDEO
============================= -->
<div id="video-modal" class="modal">
    <div class="modal-content">
        <video id="video-player" controls></video>
        <div class="modal-buttons">
            <button id="cerrar-video" class="cerrar-modal">Cerrar</button>
            <button id="siguiente-desde-video" class="cerrar-modal siguiente">Siguiente cita</button>
        </div>
    </div>
</div>

<script type="module" src="{{ url_for('static', filename='js/game.js') }}"></script>
{% endblock %}
